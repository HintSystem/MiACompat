set.item:
  type: minecraft:netherite_pickaxe
  itemModel: mineinabyss:relics/blaze_reap
  itemName: <#617B94><b>Blaze Reap
  lore:
  - ':layer_4: Grade I Relic'
  - <#C6CC8A>Contains <white>Everlasting Gunpowder<#C6CC8A>,
  - <#C6CC8A>which causes ongoing explosions
  - <#C6CC8A>on whatever it is struck on.
  - <font:small_text><gray><shadow:#00000000>Active ability. Charges weapon on right click.
  - <font:small_text><gray><shadow:#00000000>Takes 5 charges to create explosion on left click.
  enchantments:
    - enchant: minecraft:fortune
      level: 3
    - enchant: minecraft:efficiency
      level: 5
  enchantable: 0
  # tool:
  #   defaultMiningSpeed: 1.0
  #   damagePerBlock: 0
  #   rules:
  #     - correctForDrops: true
  #       speed: 38
  #       blockTypes:
  #         - mineable/pickaxe
  # weapon:
  #   damagePerAttack: 0
  unbreakable: {}
observe:
  itemLeftClick:
  - become: parent
  - ensure:
      mythicConditions:
      - hasaurastacks{n=blazereap;s=5} true
    onFail:
    - sendActionBar:
        text: <red>Not Primed
  - cooldown:
      id: BlazeReap
      length: 50s
      display: <#617B94>Blaze Reap
  - mythicSkills:
    - BlazeReap
  itemRightClick:
  - become: parent
  - ensure:
      mythicConditions:
      - hasaurastacks{n=primerstop} false
    onFail:
    - sendActionBar:
        text: <red>In Cooldown  
  - cooldown:
      id: Primer
      length: 1s
      display: <#617B94>Primer
  - mythicSkills:
    - blazereap_charge
resourcepack:
  model: mineinabyss:relics/blaze_reap
