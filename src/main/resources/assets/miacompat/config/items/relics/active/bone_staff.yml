set.item:
  itemName: <#f7e7ce>Undying Wisp
  type: minecraft:clock
  itemModel: mineinabyss:relics/bone_staff
  lore:
  - ':layer_5: Grade III Relic'
  - <#d7c9b3>The sound produced by this seemingly-primitive rattle is
  - <#d7c9b3>enough to send chills down the spine of any who hear it.  
  - <font:small_text><gray><shadow:#00000000>Active ability. Shoots projectile on right click.
  - <font:small_text><gray><shadow:#00000000>Projectile stuns the target it hits.
observe:
  itemRightClick:
  - become: parent
  - ensure:
      mythicConditions:
      - EnchantingLevel{l=>1} true
      - hasaurastacks{n=undyingwispcharge} true
      onFail:
      - sendActionBar:
          text: <red>Out of Experience / Out of Charge
  - cooldown:
      id: undying_wisp
      length: 20s
      display: <#f7e7ce>Undying Wisp
  - mythicSkills:
    - undying_wisp
passive:
- match:
  - inHand
  every: 0.1s
  run:
  - become: parent
  - mythicSkills:
    - undying_wisp_charge
- match:
  - inInventory
  every: 0.1s
  run:
  - become: parent
  - ensure:
        inSlot:
          slots: [ 40 ]
          item: mineinabyss:bone_staff
  - mythicSkills:
    - undying_wisp_charge
resourcepack:
  textures:
    layers:
    - mineinabyss:relics/undying_wisp
  parentModel: item/handheld
