set.item:
  itemName: <#705160><b>Shifting Pike
  type: minecraft:netherite_sword
  itemModel: mineinabyss:relics/bounding_lance
  lore:
  - ':layer_1: :layer_2: Grade I Relic'
  - <#AB8E8A>This Relic commonly finds its use supporting
  - <#AB8E8A>wielders of more offensively-focused relics,
  - <#AB8E8A>but is perfectly capable on its own as well.
  - <font:small_text><gray><shadow:#00000000>Active ability. Charges on right click. Has
  - <font:small_text><gray><shadow:#00000000>3 different buff modes based on the users charges on left click.
  # weapon:
  #   damagePerAttack: 0
  unbreakable: {}
observe:
  itemRightClick:
  - become: parent
  - ensure:
      mythicConditions:
      - hasaurastacks{n=shiningstop;s=1} false
      onFail:
      - sendActionBar:
          text: <red>In Cooldown  
  - cooldown:
      id: changestance
      length: 1s
      display: <#705160><b>Change Form
  - mythicSkills:
    - shiftingpikecharge
  itemLeftClick:
  - become: parent
  - ensure:
      mythicConditions:
      - hasaurastacks{n=boundinglance;s=>=1} true
      onFail:
      - sendActionBar:
          text: <red>Not Primed
  - cooldown:
      id: shifting_pike
      length: 40s
      display: <#705160><b>Shifting Pike
  - mythicSkills:
    - shifting_pike

resourcepack:
  model: mineinabyss:relics/shining_pike
