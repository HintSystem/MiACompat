set.item:
  type: minecraft:clock
  itemName: <#CCDADB><b>Shiver Mist
  itemModel: mineinabyss:relics/frost_staff
  maxStackSize: 1
  lore:
  - ':layer_5: Grade I Relic'
  - <#A0ACAD>The chemicals produced by this Relic maintain a cold enough
  - <#A0ACAD>temperature to freeze one solid, even in the hottest of climates.
  - <font:small_text><gray><shadow:#00000000>Active ability. Shoots a bunch of inaccurate projectiles
  - <font:small_text><gray><shadow:#00000000>on right click. Projectiles freeze and slow the target on hit.
observe:
  itemLeftClick:
  - become: parent
  - ensure:
      mythicConditions:
      - EnchantingLevel{l=>2} true
      onFail:
      - sendActionBar:
          text: <red>Out of Experience / Out of Charge
  - cooldown:
      id: shiver_mist_area
      length: 45s
      display: <#CCDADB>Shiver Mist
  - mythicSkills:
    - shiver_mist_hit
  itemRightClick:
  - become: parent
  - ensure:
      mythicConditions:
      - EnchantingLevel{l=>2} true
      - hasaurastacks{n=shivermistcharge} true
      onFail:
      - sendActionBar:
          text: <red>Out of Experience / Out of Charge
  - cooldown:
      id: shiver_mist
      length: 40s
      display: <#CCDADB>Shiver Mist
  - mythicSkills:
    - shiver_mist
passive:
- match:
  - inHand
  every: 0.1s
  run:
  - become: parent
  - mythicSkills:
    - shiver_mist_charger
- match:
  - inInventory
  every: 0.1s
  run:
  - become: parent
  - ensure:
        inSlot:
          slots: [ 40 ]
          item: mineinabyss:frost_staff
  - mythicSkills:
    - shiver_mist_charger
resourcepack:
  model: mineinabyss:relics/shiver_mist
