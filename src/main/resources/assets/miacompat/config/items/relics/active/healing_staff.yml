set.item:
  type: minecraft:clock
  itemName: <#f7e7ce>Symbiotic Water-shrooms
  itemModel: mineinabyss:relics/healing_staff
  lore:
  - ':layer_4: Grade III Relic'
  - <#d7c9b3>Doctors have failed to reach an agreement on the safety of fungi
  - <#d7c9b3>like these as medicine. Their efficacy, however, is beyond doubt.
  - <font:small_text><gray><shadow:#00000000>Active ability. Heals user and surroundings on right click.
observe:
  itemRightClick:
  - become: parent
  - ensure:
      mythicConditions:
      - EnchantingLevel{l=>2} true
      onFail:
      - sendActionBar:
          text: <red>Out of Experience
  - cooldown:
      id: healing_staff
      length: 35s
      display: <#f7e7ce>Symbiotic Water-shrooms
  - mythicSkills:
    - healing_staff
resourcepack:
  textures:
    layers:
    - mineinabyss:relics/symbiotic_water-shrooms
