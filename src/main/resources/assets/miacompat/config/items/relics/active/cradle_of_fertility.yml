set.item:
  itemName: <#AC8053>Cradle of Fertility
  type: minecraft:clock
  itemModel: mineinabyss:relics/cradle_of_fertility
  lore:
  - ':layer_1::layer_2: Grade IV Relic'
  - <#BB9672>The mysterious humming sound this orb produces is cited
  - <#BB9672>as a cause of its apparent worship in ancient societies.
  - <font:small_text><gray><shadow:#00000000>Active ability. Bone meals the surrounding area on right click.
resourcepack:
  textures:
    layers:
    - mineinabyss:relics/cradle_of_fertility
observe:
  itemRightClick:
  - become: parent
  - cooldown:
      id: wish_of_fertility
      length: 30s
      display: <#AC8053>Cradle of Fertility
  - geary:bonemeal_radius:
       radius: 5
       allowCrops: true
       allowSaplings: true
       excludedBlocks:
         - GRASS_BLOCK
         - DIRT
  - mythicSkills:
    - wish_of_fertility
