set.item:
  type: minecraft:netherite_sword
  itemModel: mineinabyss:relics/yukonokage
  itemName: <#c7f9ff><b>Yūkonokage
  lore:
  - ':layer_5: Grade I Relic'
  - <#80d0d9>Discovered and named by a foreign Cave Raider, this scythe 
  - <#80d0d9>carries a long history of ruin. Will you carry on its legacy?
  - <#83a0a3><i>Each swing with its jagged blade rends not 
  - <#83a0a3><i>just flesh—but the soul itself. When
  - <#83a0a3><i>right-clicked and crouching, the scythe unleashes 
  - <#83a0a3><i>the pent-up souls in a violent burst of
  - <#83a0a3><i>spectral energy, tearing through all nearby life.
  unbreakable: {}
  enchantmentGlintOverride: false
observe:
  itemLeftClick:
  - become: parent
  - mythicSkills:
    - yukonokage_hit
  itemRightClick:
  - become: parent
  - ensure:
      mythicConditions:
      - hasaurastacks{n=yukonokage_souls} true
      onFail:
      - sendActionBar:
          text: <red>You have insufficient souls
  - cooldown:
      id: yukonokage
      length: 5s
      display: <#c7f9ff>Yukonokage
  - mythicSkills:
    - yukonokage_ability
passive:
- match:
  - inHand
  every: 1s
  run:
  - become: parent 
  - mythicSkills:
    - yukonokage_soul_display
- match:
  - inInventory
  every: 1s
  run:
  - become: parent
  - ensure:
        inSlot:
          slots: [ 40 ]
          item: mineinabyss:yukonokage
  - mythicSkills:
    - yukonokage_soul_display
resourcepack:
  model: mineinabyss:relics/yukonokage