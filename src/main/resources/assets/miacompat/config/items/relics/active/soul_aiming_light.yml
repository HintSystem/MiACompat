set.item:
  type: minecraft:clock
  itemName: <#4c6444>Soul-aiming Light
  itemModel: mineinabyss:relics/soul-aiming_light
  lore:
  - ':layer_5: Grade II Relic'
  - <#43583c>A prototype device once wielded by the Sovereign of Dawn,
  - <#43583c>discarded for unknown reasons.
  - <font:small_text><gray><shadow:#00000000>Active ability. Shoots multiple homing
  - <font:small_text><gray><shadow:#00000000>projectiles on right click.
observe:
  itemRightClick:
  - become: parent
  - ensure:
      mythicConditions:
      - EnchantingLevel{l=>2} true
      onFail:
      - sendActionBar:
          text: <red>Out of Experience
  - cooldown:
      id: aiming_light
      length: 35s
      display: <#4c6444>Aiming Light
  - applyPotionEffects:
    - type: minecraft:glowing
      duration: 10s
      amplifier: 1
      hasParticles: false
    - type: minecraft:darkness
      duration: 2s
      amplifier: 1
      hasParticles: false
  - geary:shulker_bullet:
      amount: 3
      damage: 17
      radius: 20
      homing: true
      speed: 2
      duration: 40
      effects:
        - type: minecraft:glowing
          duration: 100.0t
        - type: minecraft:darkness
          duration: 60.0t
          amplifier: 1
resourcepack:
  textures:
    layers:
    - mineinabyss:relics/soul-aiming_light
  parentModel: item/handheld
