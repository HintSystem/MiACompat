set.item:
  itemName: <#4c6444>Gust-Shot
  type: minecraft:clock
  itemModel: mineinabyss:relics/wind_staff
  lore:
  - ':layer_3: Grade II Relic'
  - <#43583c>A key example of nature inspiring innovation, this handmade
  - <#43583c>Relic one-ups even the creature it was inspired by.  
  - <font:small_text><gray><shadow:#00000000>Active ability. Shoots a projectile on right click which
  - <font:small_text><gray><shadow:#00000000>explodes on hit launching entities in different directions.
observe:
  itemRightClick:
  - become: parent
  - ensure:
      mythicConditions:
      - EnchantingLevel{l=>1} true
      - hasaurastacks{n=gustshotcharge} true
    onFail:
    - sendActionBar:
        text: <red>Out of Experience / Out of Charge
  - cooldown:
      id: gust-shot
      length: 20s
      display: <#4c6444>Gust-Shot
  - mythicSkills:
    - gust-shot
passive:
- match:
  - inHand
  every: 0.1s
  run:
  - become: parent
  - mythicSkills:
    - gust-shot_charge
- match:
  - inInventory
  every: 0.1s
  run:
  - become: parent
  - ensure:
        inSlot:
          slots: [ 40 ]
          item: mineinabyss:wind_staff
  - mythicSkills:
    - gust-shot_charge
resourcepack:
  textures:
    layers:
    - mineinabyss:relics/gust-shot
  parentModel: item/handheld
