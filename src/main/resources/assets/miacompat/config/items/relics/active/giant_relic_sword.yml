set.item:
  type: minecraft:netherite_sword
  itemModel: mineinabyss:relics/crescent_blade
  itemName: <#15ABC2><b>Crescent Hatchet
  lore:
  - ':layer_3: Grade I Relic'
  - <#249C9C>This Relic easily and effectively slices through the air, and even the
  - <#249C9C>Abyss itself, using its surroundings’ mysterious nature to its advantage.
  - <font:small_text><gray><shadow:#00000000>Active ability. Creates charges on right click.Takes increasing amounts
  - <font:small_text><gray><shadow:#00000000>of charges to create a slash of varying strength on left click.
  # tool:
  #   defaultMiningSpeed: 1.0
  #   damagePerBlock: 0
  #   rules:
  #     - correctForDrops: true
  #       speed: 9
  #       blockTypes:
  #         - mineable/axe
  unbreakable: {}
observe:
  itemLeftClick:
  - become: parent
  - ensure:
      mythicConditions:
      - hasaurastacks{n=crescentprimer;s=>=1} true
      onFail:
      - sendActionBar:
          text: <red>Not Primed
  - cooldown:
      id: cyanslash
      length: 10s
      display: <#15ABC2>Crescent Hatchet
  - mythicSkills:
    - crescent_slash
  itemRightClick:
  - become: parent
  - ensure:
      mythicConditions:
      - hasaurastacks{n=crescentstop} false
      onFail:
      - sendActionBar:
          text: <red>In Cooldown  
  - cooldown:
      id: crescentprimer
      length: 1s
      display: <#617B94>Primer
  - mythicSkills:
    - crescent_primer
resourcepack:
  model: mineinabyss:relics/crescent_blade
