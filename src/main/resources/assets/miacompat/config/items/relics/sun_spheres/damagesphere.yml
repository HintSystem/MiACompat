set.item:
  type: minecraft:clock
  itemName: <#AC8053>Damage Sphere
  itemModel: mineinabyss:relics/l1_sunsphere
  lore:
  - ':layer_1: Grade IV Relic'
  - <#BB9672>It is an egg-shaped relic with
  - <#BB9672>white and grey patterns on its surface.
  - <#BB9672>It has a smooth texture and has a cracking
  - <#BB9672>noise like eggs if pressure is applied to it.
  - <#C4A484><i>Damages creatures on contact if thrown.
observe:
  itemRightClick:
  - become: parent
  - cooldown:
      id: damagesphere
      length: 5s
      display: <#BFBFBF>Damage Sphere
  - mythicSkills:
    - damagethrow
  - consumeItem:
      type: mineinabyss:damagesphere
      when:
      - chance: 1
resourcepack:
  model: mineinabyss:relics/l1_sunsphere
  textures:
    layers:
    - mineinabyss:relics/l1_sunsphere
