set.item:
  type: minecraft:netherite_axe
  itemModel: mineinabyss:relics/giant_relic_hammer
  itemName: <#79EDE2><b>Necrometallic Sledge
  lore:
  - ':layer_3: Grade I Relic'
  - <#4A8781>The bacteria inside the head of this hammer is so densely
  - <#4A8781>populated that it leaves a visible cloud when released. 
  - <font:small_text><gray><shadow:#00000000>Active ability. Lunges the user upward on right click
  - <font:small_text><gray><shadow:#00000000>followed by a large impact which poisons the surroundings.
  - <font:small_text><gray><shadow:#00000000>Inflicts a poison like effect on the target on left click.
  unbreakable: {}
  enchantmentGlintOverride: false
observe:
  itemLeftClick:
  - become: parent
  - mythicSkills:
    - necrometallic_sledge_hit
  itemRightClick:
  - become: parent
  - ensure:
      mythicConditions:
      - hasaurastacks{n=necrometallicsledgecharge} true
    onFail:
    - sendActionBar:
        text: <red>Lacks Charge
  - cooldown:
      id: hammer_smash
      length: 32s
      display: <#79EDE2>Necrometallic Sledge
  - mythicSkills:
    - necrometallic_sledge_ability
passive:
- match:
  - inHand
  every: 0.1s
  run:
  - become: parent
  - mythicSkills:
    - necrometallic_sledge_charge
- match:
  - inInventory
  every: 0.1s
  run:
  - become: parent
  - ensure:
        inSlot:
          slots: [ 40 ]
          item: mineinabyss:giant_relic_hammer
  - mythicSkills:
    - necrometallic_sledge_charge
resourcepack:
  model: mineinabyss:relics/necrometallic_sledge
