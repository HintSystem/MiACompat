set.item:
  itemName: <#f7e7ce>Treble Winds
  type: minecraft:clock
  itemModel: mineinabyss:relics/relic_boots
  lore:
  - ':layer_3: Grade III Relic'
  - <#d7c9b3>Researchers speculate that this Relic’s purpose was never to send
  - <#d7c9b3>oneself flying, but that never stopped anyone from using it that way.
  - <font:small_text><gray><shadow:#00000000>Active ability. Propels the user upward on
  - <font:small_text><gray><shadow:#00000000>right click and forward on left click.
observe:
  itemRightClick:
  - become: parent
  - cooldown:
      id: treble_winds
      length: 20s
      display: <#f7e7ce>Treble Winds      
  - mythicSkills:
    - treble_winds_upward
  itemLeftClick:
  - become: parent
  - cooldown:
      id: treble_winds
      length: 30s
      display: <#f7e7ce>Treble Winds      
  - mythicSkills:
    - treble_winds_forward
resourcepack:
  textures:
    layers:
    - mineinabyss:relics/treble_winds
