set.item:
  type: minecraft:clock
  itemName: <#f7e7ce>Petrifying Stone
  itemModel: mineinabyss:relics/petrifying_stone
  lore:
  - ':layer_1: Grade III Relic'
  - <#d7c9b3>A foreign composer once introduced this Relic into his orchestra.
  - <#d7c9b3>Shortly after, several of his woodwinds quit.
  - <font:small_text><gray><shadow:#00000000>Active ability. Slows user and surroundings on right click.
observe:
  itemRightClick:
  - become: parent
  - ensure:
      mythicConditions:
      - hasaurastacks{n=petrifyingstonecharge} true
      onFail:
      - sendActionBar:
          text: <red>Lacks Charge
  - cooldown:
      id: petrifying_thud
      length: 44s
      display: <#f7e7ce>Petrifying Stone
  - mythicSkills:
    - petrifying_thud
passive:
- match:
  - inHand
  every: 0.1s
  run:
  - become: parent
  - mythicSkills:
    - petrifying_stone_charge
- match:
  - inInventory
  every: 0.1s
  run:
  - become: parent
  - ensure:
        inSlot:
          slots: [ 40 ]
          item: mineinabyss:petrifying_stone
  - mythicSkills:
    - petrifying_stone_charge
resourcepack:
  textures:
    layers:
    - mineinabyss:relics/petrifying_stone
