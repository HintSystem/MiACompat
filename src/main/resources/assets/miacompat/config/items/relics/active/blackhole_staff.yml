set.item:
  type: minecraft:clock
  itemName: <#302D2D><b>Subtle Pull
  itemModel: mineinabyss:relics/blackhole_staff
  maxStackSize: 1
  lore:
  - ':layer_5: Grade I Relic'
  - <#570F01>The draw of the Abyss upon those who gaze into it
  - <#570F01>is inescapable. This Relic makes that feeling palpable.
  - <font:small_text><gray><shadow:#00000000>Active ability. Shoots projectile on right click.
  - <font:small_text><gray><shadow:#00000000>Projectile pulls targets and deals a large amount of damage.
observe:
  itemLeftClick:
  - become: parent
  - ensure:
      mythicConditions:
      - EnchantingLevel{l=>3} true
      - hasaurastacks{n=subtlepullcharge} true
    onFail:
    - sendActionBar:
        text: <red>Out of Experience / Out of Charge
  - cooldown:
      id: subtle_pull_sub
      length: 25s
      display: <#302D2D>Subtle Pull
  - mythicSkills:
    - subtle_pull_hit
  itemRightClick:
  - become: parent
  - ensure:
      mythicConditions:
      - EnchantingLevel{l=>5} true
      - hasaurastacks{n=subtlepullcharge} true
    onFail:
    - sendActionBar:
        text: <red>Out of Experience / Out of Charge
  - cooldown:
      id: subtle_pull_main
      length: 80s
      display: <#302D2D>Subtle Pull
  - mythicSkills:
    - subtle_pull
passive:
- match:
  - inHand
  every: 0.1s
  run:
  - become: parent
  - mythicSkills:
    - subtle_pull_charge
- match:
  - inInventory
  every: 0.1s
  run:
  - become: parent
  - ensure:
        inSlot:
          slots: [ 40 ]
          item: mineinabyss:blackhole_staff
  - mythicSkills:
    - subtle_pull_charge
resourcepack:
  model: mineinabyss:relics/subtle_pull
