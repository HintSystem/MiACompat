set.item:
  type: minecraft:clock
  itemName: <#0047AB>Flamethrower
  itemModel: mineinabyss:relics/flamethrower
  maxStackSize: 1
  lore:
  - 'Grade II Relic'
  - <#3d59ab>A relic born from decades of Orthian research.
  - <#3d59ab>Flamethrowers are vastly considered inhumane in use.
  - <font:small_text><gray><shadow:#00000000>Active ability. Projects flames on right click.
  - <font:small_text><gray><shadow:#00000000>Requires Flamethrower Fuel within the inventory to work.
resourcepack:
  model: mineinabyss:relics/flamethrower
set.recipes:
 result:
   prefab: mineinabyss:flamethrower
 discoverRecipes: true
 recipes:
 - type: shaped
   items:
     H:
       prefab: mineinabyss:himushi_core
     C:
       prefab: mineinabyss:charcoal_sand_ingot
     F:
       prefab: mineinabyss:flamethrower_fuel
     B:
       prefab: mineinabyss:flamethrower_barrel
     I:
       prefab: mineinabyss:ikonia_plate
   configuration: |-
     |CIF|
     |BHC|
     |CCC|
observe:
  itemRightClick:
  - become: parent
  - ensure:
      hasConsumable:
        type: mineinabyss:flamethrower_fuel
      mythicConditions:
      - hasaurastacks{n=flamethrowercharge} true
      onFail:
      - sendActionBar:
          text: <red>Out of fuel
  - cooldown:
      id: flamethrower
      length: 5s
      display: <dark_aqua>Flamethrower
  - mythicSkills:
    - flamethrower_torrent
  - consumeItem:
      type: mineinabyss:flamethrower_fuel
    when:
    - chance: 0.3
passive:
- match:
  - inHand
  every: 0.1s
  run:
  - become: parent
  - mythicSkills:
    - flamethrower_charge
- match:
  - inInventory
  every: 0.1s
  run:
  - become: parent
  - ensure:
        inSlot:
          slots: [ 40 ]
          item: mineinabyss:flamethrower
  - mythicSkills:
    - flamethrower_charge
