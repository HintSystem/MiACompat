set.item:
  type: minecraft:clock
  itemName: <#0047AB>Grapple Hook
  itemModel: mineinabyss:relics/grapplehook
  maxStackSize: 1
  lore:
  - 'Grade II Relic'
  - <#3d59ab>Getting around the Abyss can be quite tough. Thankfully 
  - <#3d59ab>entrepreneurial delvers came up with this contraption.
  - <#3d59ab>Use at your own risk.
  - <font:small_text><gray><shadow:#00000000>Active ability. Right click to launch yourself
  - <font:small_text><gray><shadow:#00000000>towards your target or pull mobs towards you.
set.recipes:
 result:
   prefab: mineinabyss:grapplehook
 discoverRecipes: true
 recipes:
 - type: shaped
   items:
     C:
       prefab: mineinabyss:charcoal_sand_ingot
     P:
       prefab: mineinabyss:relicboots
     S:
       prefab: mineinabyss:spikewalker_spike
   configuration: |-
     |CCC|
     |CCP|
     | CS|
observe:
  itemRightClick:
  - become: parent
  - ensure:
      mythicConditions:
      - hasaurastacks{n=gapplehookcharge} true
    onFail:
    - sendActionBar:
        text: <red>Out of Charge
  - cooldown:
      id: grapplehook
      length: 7s
      display: <#0047AB>Grapple Hook
  - mythicSkills:
    - grapplehook_shoot
passive:
- match:
  - inHand
  every: 0.1s
  run:
  - become: parent
  - mythicSkills:
    - grapplehook_charge
- match:
  - inInventory
  every: 0.1s
  run:
  - become: parent
  - ensure:
        inSlot:
          slots: [ 40 ]
          item: mineinabyss:grapplehook
  - mythicSkills:
    - grapplehook_charge
resourcepack:
  model: mineinabyss:relics/grapple_hook/grapplinghookretracted
