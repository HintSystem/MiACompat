observe:
  itemRightClick:
  - become: parent
  - ensure:
      player:
        sneaking: true
      mythicConditions:
      - health{h=1to19} true
    onFail:
    - sendActionBar:
        text: <red>Not Sneaking / Full Health
  - cooldown:
      id: bandage
      length: 20s
      display: <#617B94>Simple Bandage
  - mythicSkills:
    - simple_bandage
passive:
- match:
  - inInventory
  every: 0.25s # Give some time for the aura to be removed, try to avoid deleting multiple
  run:
  - become: parent
  - ensure:
      hasConsumable:
        type: mineinabyss:simple_bandage
      mythicConditions:
      - hasaurastacks{n=consumedbandage} true
  - consumeItem:
      type: mineinabyss:simple_bandage
  - mythicSkills:
    - simple_bandage_consume
