set.item:
  type: minecraft:clock
  itemName: Simple Bandage
  itemModel: mineinabyss:gear/utility/simple_bandage
  lore:
  - <#d4be90>A standard issue bandage. Treats most non-grievous wounds.
  - <#dfceac><i>Active ability. On right consumes bandage healing the user.
  maxStackSize: 16
  consumable:
      animation: BRUSH
      duration: 9999s
      sound: item.bone_meal.use
      particles: false
      # consumeEffects:
      #   - type: APPLY
      #     effects:
      #     - type: minecraft:instant_health
      #       durationTicks: 2s
      #       hasParticles: false
resourcepack:
  parentModel: item/handheld
  model: mineinabyss:gear/utility/simple_bandage
  textures:
    layers:
    - mineinabyss:gear/utility/simple_bandage

