set.item:
  itemName: <#4c6444>Detector type I
  type: minecraft:clock
  itemModel: mineinabyss:relics/detector_type_i
  lore:
  - '<emojy:layer_5> Grade II Relic'
  - <#43583c>The perfect companion for the haughtiest of hunters, this mask makes
  - <#43583c>sure to point out creatures it deems less valuable than the wearer.
  - <font:small_text><gray><shadow:#00000000>Passive slot ability. Applies damage modifier and
  - <font:small_text><gray><shadow:#00000000>glow effect to any mob the wearer is looking at.
passive:
- match:
  - inInventory
  every: 1s
  run:
  - become: parent
  - ensure:
        mythicConditions:
          - hasaura{n=reliceffectcancel} false
        inSlot:
          slots: [ 9, 10 ]
          item: mineinabyss:detector_type_i
  - mythicSkills:
    - detector_type_i
resourcepack:
  textures:
    layers:
    - mineinabyss:relics/detector_type_i
