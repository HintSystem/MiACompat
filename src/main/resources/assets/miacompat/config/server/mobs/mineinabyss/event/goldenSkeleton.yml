goldenSkeleton:
  Type: PIG
  Display: "<green>Blessed Skeleton"
  AIGoalSelectors:
    - clear
  AITargetSelectors:
    - clear
  Health: 5
  Damage: 0
  Options:
    Silent: true
    PreventOtherDrops: true
    Collidable: false
    KnockbackResistance: 1
  # Model:
  #   Id: golden_skeleton_1
  #   ViewRadius: 100
  #   Drive: false
  #   DamageTint: false
  #   Scale: 1
  # TODO switch to `model` skill when it's fixed (currently it can not disguise the entity in certain cases, ex. when teleporting)

  DamageModifiers:
    - FALL 0.001
    - DROWNING 0.001
    - ENTITY_SWEEP_ATTACK 0.001
  Drops:
    - exp 14-44
    - golden_carrot 8-16 1
    - raw_gold_block 1-1 1
    - GoldenSkelPlayerHeads
    #- geary mineinabyss:spreadsphere 1-1 0.15 nolooting
  Skills:
    - skill{s=displayHealth} ~onDamaged
    - randomskill{skills=
     [- model{modelid=golden_skeleton_1;radius=100;damagetint=false;drive=false}] 0.6,
     [- model{modelid=golden_skeleton_2;radius=100;damagetint=false;drive=false}] 0.4 } @self ~onSpawnOrLoad
    #- randomskill{skills= relicDropLamentsThread 0.33, relicDropMockwaterFluid 0.33, relicDropSinSpiral 0.1, relicDropGambitIncense 0.25} ~onDeath 1
    - randomskill{skills= relicDropLamentsThread 0.3, relicDropMockwaterFluid 0.3, relicDropSinSpiral 0.1, relicDropGambitIncense 0.2, [- skill{s=relicDrop;item=CapillaryBladeDrop;grade=1}] 0.005, [- skill{s=relicDrop;item=BoundingLanceDrop;grade=1}] 0.005, [- skill{s=relicDrop;item=RelicBowDrop;grade=1}] 0.005, [- skill{s=relicDrop;item=NecrometallicBladeDrop;grade=1}] 0.005, [- skill{s=relicDrop;item=AtlasDignitasDrop;grade=1}] 0.005, [- skill{s=relicDrop;item=GiantRelicSwordDrop;grade=1}] 0.005, [- skill{s=relicDrop;item=GiantRelicHammerDrop;grade=1}] 0.005, [- skill{s=relicDrop;item=BlazeReapDrop;grade=1}] 0.005, [- skill{s=relicDrop;item=TridentDrop;grade=1}] 0.005, [- skill{s=relicDrop;item=ReverberatingEdgeDrop;grade=1}] 0.005, [- skill{s=relicDrop;item=YukonokageDrop;grade=1}] 0.005, [- skill{s=relicDrop;item=FrostStaffDrop;grade=1}] 0.005, [- skill{s=relicDrop;item=BlackholeStaffDrop;grade=1}] 0.005} ~onDeath 1
    - skill{s=golden_skeleton_death} ~onDeath