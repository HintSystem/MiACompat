prayingSkeleton_base:
  Type: PIG
  Display: "<green>Praying Skeleton"
  AIGoalSelectors:
    - clear
  AITargetSelectors:
    - clear
  Health: 5
  Damage: 0
  Options:
    Silent: true
    PreventOtherDrops: true
    Collidable: false
    KnockbackResistance: 1
  # Model:
  #   Id: praying_skeleton_1
  #   ViewRadius: 100
  #   Drive: false
  #   DamageTint: false
  #   Scale: 1
  # TODO switch to `model` skill when it's fixed (currently it can not disguise the entity in certain cases, ex. when teleporting)

  DamageModifiers:
    - FALL 0.001
    - DROWNING 0.001
    - ENTITY_SWEEP_ATTACK 0.001
  Skills:
    # Choose a random model for this skeleton
    - randomskill{skills=
     [- model{modelid=praying_skeleton_1;radius=100;damagetint=false;drive=false}] 0.3,
     [- model{modelid=praying_skeleton_2;radius=100;damagetint=false;drive=false}] 0.2,
     [- model{modelid=praying_skeleton_3;radius=100;damagetint=false;drive=false}] 0.15,
     [- model{modelid=praying_skeleton_4;radius=100;damagetint=false;drive=false}] 0.2,
     [- model{modelid=praying_skeleton_5;radius=100;damagetint=false;drive=false}] 0.15 } @self ~onSpawnOrLoad
    - skill{s=displayHealth} ~onDamaged