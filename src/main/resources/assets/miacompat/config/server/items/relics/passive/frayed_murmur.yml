set.item:
  itemName: <#f7e7ce>Frayed Murmur
  type: minecraft:clock
  itemModel: mineinabyss:relics/frayed_murmur
  lore:
  - '<emojy:layer_3> Grade III Relic'
  - <#d7c9b3>Derived from technology recovered from Interference Units, this
  - <#d7c9b3>mask bends light around its wearer, but inexplicably not itself.
  - <font:small_text><gray><shadow:#00000000>Passive slot ability. Turns the user invisible.
passive:
- match:
  - inInventory
  every: 4s
  run:
  - become: parent
  - ensure:
        mythicConditions:
          - hasaura{n=reliceffectcancel} false
        inSlot:
          slots: [ 9, 10 ]
          item: mineinabyss:frayed_murmur
  - applyPotionEffects:
    - type: minecraft:invisibility
      duration: 8s
      hasParticles: false
  - mythicSkills:
    - frayed_murmur

resourcepack:
  textures:
    layers:
    - mineinabyss:relics/frayed_murmur
