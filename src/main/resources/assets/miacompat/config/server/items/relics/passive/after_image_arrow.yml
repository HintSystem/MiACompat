set.item:
  itemName: <#4c6444>Whisper Image
  type: minecraft:clock
  itemModel: mineinabyss:relics/after_image_arrow
  lore:
  - '<emojy:layer_2> Grade II Relic'
  - <#43583c>The hard-light copies of projectiles produced 
  - <#43583c>by this Relic still hurt as though they were real. 
  - <font:small_text><gray><shadow:#00000000>Passive slot ability. On bow and crossbow use
  - <font:small_text><gray><shadow:#00000000>shoots an additional projectile which deals damage.
passive:
- match:
  - inInventory
  every: 1s
  run:
  - become: parent
  - ensure:
        inSlot:
          slots: [ 9, 10 ]
          item: mineinabyss:after_image_arrow
  - mythicSkills:
    - after_image_arrow
resourcepack:
  textures:
    layers:
    - mineinabyss:relics/after_image_arrow
