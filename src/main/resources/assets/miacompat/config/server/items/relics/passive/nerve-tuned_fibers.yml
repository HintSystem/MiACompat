set.item:
  itemName: <#f7e7ce>Nerve-tuned Fibers
  type: minecraft:clock
  itemModel: mineinabyss:relics/nerve-tuned_fibers
  lore:
  - '<emojy:layer_5> Grade III Relic'
  - <#d7c9b3>Bearers of this organic armor describe wearing it as disgusting,
  - <#d7c9b3>though some insist it makes them feel less alone in the vast Abyss.
  - <font:small_text><gray><shadow:#00000000>Passive slot ability. Twitches and grants haste.
passive:
- match:
  - inInventory
  every: 4s
  run:
  - become: parent
  - ensure:
        inSlot:
          slots: [ 9, 10 ]
          item: mineinabyss:nerve-tuned_fibers 
  - applyPotionEffects:
    - type: minecraft:haste
      duration: 8s
      hasParticles: false
  - mythicSkills:
    - nerve-tunedtwitch

resourcepack:
  textures:
    layers:
    - mineinabyss:relics/nerve-tuned_fibers
