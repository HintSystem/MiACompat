set.item:
  itemName: <gold>Laments Thread
  type: minecraft:clock
  itemModel: mineinabyss:relics/laments_thread
  lore:
  - 'Grade III Relic'
  - <#cdd13d>It’s unclear why Delvers carry Laments Thread with them, given 
  - <#cdd13d>its effects. Nonetheless, it finds its use with certain groups.
  - <font:small_text><gray><shadow:#00000000>Passive slot ability. Causes weakness and
  - <font:small_text><gray><shadow:#00000000>mining fatigue to the user and the surroundings.
passive:
- match:
  - inInventory
  every: 2s
  run:
  - become: parent
  - ensure:
        inSlot:
          slots: [ 9, 10 ]
          item: mineinabyss:laments_thread
  - mythicSkills:
    - laments_thread
resourcepack:
  textures:
    layers:
    - mineinabyss:relics/laments_thread
