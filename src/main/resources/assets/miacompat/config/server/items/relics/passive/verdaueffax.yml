set.item:
  itemName: <#4c6444>Gold-mending Wedge
  type: minecraft:clock
  itemModel: mineinabyss:relics/vverdaueffax
  lore:
  - '<emojy:layer_1><emojy:layer_2> Grade II Relic'
  - <#43583c>Outside of the Abyss, this Relic fetches a high
  - <#43583c>price for its uses in chronic pain treatment. 
  - <font:small_text><gray><shadow:#00000000>Passive slot ability. Grants fast regen
  - <font:small_text><gray><shadow:#00000000>when the user drops below 3 hearts.
passive:
- match:
  - inInventory
  every: 0.1s
  run:
  - become: parent
  - ensure:
      inSlot:
          slots: [ 9, 10 ]
          item: mineinabyss:verdaueffax
      mythicConditions:
      - health{h=1to5} true
  - cooldown:
      id: gold-mending_wedge
      length: 400s
      display: <#88D481>Gold-mending Wedge
  - mythicSkills:
    - gold-mending_wedge
resourcepack:
  textures:
    layers:
    - mineinabyss:relics/gold-mending_wedge
