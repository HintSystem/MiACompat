passive:
- match:
  - inInventory
  every: 15s
  run:
    - become: parent
    - ensure:
          inSlot:
            slots: [ 9, 10 ]
            item: mineinabyss:ghost_seek_3
    - geary:ghost_seek:
        radii:
          250:
            - mythicSkills: [ ghost_seek_effect_1 ]
          150:
            - mythicSkills: [ ghost_seek_effect_2 ]
          100:
            - mythicSkills: [ ghost_seek_effect_3 ]
          50:
            - mythicSkills: [ ghost_seek_effect_4 ]
          25:
            - mythicSkills:
                - ghost_seek_effect_5
                - ghost_seek_glow_nearby

resourcepack:
  model: mineinabyss:gear/utility/ghost_seek_on
